<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Planner AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #2c2c2c; color: #fff; padding: 16px; text-align: center; font-size: 1.1rem; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .user { align-self: flex-end; background: #0084ff; color: #fff; }
  .bot { align-self: flex-start; background: #e4e6eb; color: #000; }
  #input-area { display: flex; padding: 12px; gap: 8px; background: #fff; border-top: 1px solid #ddd; }
  #input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; }
  #input:focus { border-color: #0084ff; }
  #send { padding: 10px 20px; background: #0084ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <div id="header">Wedding Planner AI</div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off">
    <button id="send">Enviar</button>
  </div>
<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const send = document.getElementById('send');

  function addMsg(text, cls) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    send.disabled = true;
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      addMsg(data.response, 'bot');
    } catch (e) {
      addMsg('Error de conexion', 'bot');
    }
    send.disabled = false;
    input.focus();
  }

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  input.focus();
</script>
</body>
</html>
